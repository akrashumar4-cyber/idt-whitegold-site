<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — International Diamond Trade</title>
<meta name="description" content="Sign in to your International Diamond Trade account.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg0: #06080F;
  --bg1: #0D1020;
  --bg2: #131726;
  --gold: #C9A84C;
  --gold-light: #E8D5A3;
  --gold-dim: rgba(201,168,76,0.10);
  --gold-glow: rgba(201,168,76,0.22);
  --gold-border: rgba(201,168,76,0.28);
  --text: #E8E8F0;
  --text-muted: #8A8FAA;
  --border-sub: rgba(255,255,255,0.06);
  --red: #E05555;
  --green: #4CAF7D;
  --radius: 18px;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg0);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%, rgba(201,168,76,0.055) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 90%, rgba(201,168,76,0.04) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ── Top bar ── */
.topbar {
  width: 100%;
  padding: 28px 48px;
  display: flex;
  align-items: center;
  border-bottom: 1px solid var(--border-sub);
  position: relative;
  z-index: 1;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 14px;
  text-decoration: none;
  color: inherit;
}

.logo-diamond { width: 38px; height: 38px; flex-shrink: 0; }

.logo-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.35rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--gold-light);
  display: flex;
  flex-direction: column;
  line-height: 1;
  gap: 3px;
}

.logo-sub {
  font-size: 0.6rem;
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-muted);
}

/* ── Main ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 64px 24px 96px;
  position: relative;
  z-index: 1;
  width: 100%;
}

.eyebrow {
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.eyebrow::before, .eyebrow::after {
  content: '';
  display: block;
  width: 32px;
  height: 1px;
  background: var(--gold);
  opacity: 0.5;
}

.heading {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 400;
  text-align: center;
  color: var(--gold-light);
  margin-bottom: 40px;
  letter-spacing: 0.01em;
}

/* ── Card ── */
.card {
  background: var(--bg1);
  border: 1px solid var(--gold-border);
  border-radius: var(--radius);
  padding: 48px 44px 40px;
  width: 100%;
  max-width: 440px;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 70% 40% at 50% 0%, rgba(201,168,76,0.06) 0%, transparent 70%);
  pointer-events: none;
}

/* ── Form ── */
.form { display: flex; flex-direction: column; gap: 20px; position: relative; }

.field { display: flex; flex-direction: column; gap: 7px; }

label {
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
}

input[type="email"],
input[type="password"],
input[type="text"] {
  background: var(--bg2);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 8px;
  padding: 13px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  width: 100%;
}

input:focus {
  border-color: rgba(201,168,76,0.55);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
}

input::placeholder { color: var(--text-muted); opacity: 0.6; }

/* ── Forgot link ── */
.forgot-wrap {
  display: flex;
  justify-content: flex-end;
  margin-top: -8px;
}

.forgot-link {
  font-size: 0.8rem;
  color: var(--text-muted);
  text-decoration: none;
  transition: color 0.2s;
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  padding: 0;
}
.forgot-link:hover { color: var(--gold); }

/* ── Buttons ── */
.btn-gold {
  background: var(--gold);
  color: #06080F;
  border: 1px solid var(--gold);
  border-radius: 8px;
  padding: 14px 32px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: background 0.2s, box-shadow 0.2s;
  width: 100%;
  margin-top: 4px;
}
.btn-gold:hover {
  background: var(--gold-light);
  box-shadow: 0 4px 24px rgba(201,168,76,0.3);
}
.btn-gold:disabled {
  opacity: 0.55;
  cursor: not-allowed;
}

/* ── Status messages ── */
.msg {
  font-size: 0.85rem;
  padding: 11px 14px;
  border-radius: 8px;
  display: none;
  line-height: 1.5;
}
.msg.error { background: rgba(224,85,85,0.1); border: 1px solid rgba(224,85,85,0.3); color: #f08080; display: block; }
.msg.success { background: rgba(76,175,125,0.1); border: 1px solid rgba(76,175,125,0.3); color: #6fcf97; display: block; }

/* ── Footer note ── */
.footer-note {
  margin-top: 28px;
  font-size: 0.82rem;
  color: var(--text-muted);
  text-align: center;
  line-height: 1.7;
}
.footer-note a {
  color: var(--gold);
  text-decoration: none;
}
.footer-note a:hover { text-decoration: underline; }

/* ── Divider ── */
.divider {
  height: 1px;
  background: var(--border-sub);
  margin: 4px 0;
}

@media (max-width: 500px) {
  .topbar { padding: 20px 20px; }
  .card { padding: 36px 24px 32px; }
}
</style>
</head>
<body>

<header class="topbar">
  <a href="/" class="nav-logo">
    <svg class="logo-diamond" viewBox="0 0 40 40" fill="none">
      <polygon points="20,2 38,14 38,26 20,38 2,26 2,14" stroke="#C9A84C" stroke-width="1" fill="rgba(201,168,76,0.05)"/>
      <polygon points="20,8 32,16 32,24 20,32 8,24 8,16" stroke="#C9A84C" stroke-width="0.5" fill="rgba(201,168,76,0.08)"/>
      <line x1="20" y1="2" x2="20" y2="38" stroke="#C9A84C" stroke-width="0.4" opacity="0.5"/>
      <line x1="2" y1="14" x2="38" y2="26" stroke="#C9A84C" stroke-width="0.4" opacity="0.5"/>
      <line x1="2" y1="26" x2="38" y2="14" stroke="#C9A84C" stroke-width="0.4" opacity="0.5"/>
      <circle cx="20" cy="20" r="2" fill="#C9A84C" opacity="0.7"/>
    </svg>
    <span class="logo-text">IDT
      <span class="logo-sub">International Diamond Trade</span>
    </span>
  </a>
</header>

<main class="main">
  <div class="eyebrow">Welcome Back</div>
  <h1 class="heading" id="page-heading">Sign In to IDT</h1>

  <div class="card">

    <!-- ── Sign-in form ── -->
    <form class="form" id="signin-form">
      <div id="signin-msg" class="msg"></div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>

      <div class="forgot-wrap">
        <button type="button" class="forgot-link" id="forgot-btn">Forgot password?</button>
      </div>

      <button type="submit" class="btn-gold" id="signin-submit">Sign In →</button>
    </form>

    <!-- ── Forgot password form (hidden by default) ── -->
    <form class="form" id="reset-form" style="display:none;">
      <div id="reset-msg" class="msg"></div>

      <div class="field">
        <label for="reset-email">Email address</label>
        <input type="email" id="reset-email" placeholder="you@example.com" autocomplete="email" required>
      </div>

      <button type="submit" class="btn-gold" id="reset-submit">Send Reset Link →</button>

      <button type="button" class="forgot-link" id="back-to-signin" style="text-align:center;">← Back to sign in</button>
    </form>

    <!-- ── Set new password form (shown when #access_token present) ── -->
    <form class="form" id="newpass-form" style="display:none;">
      <div id="newpass-msg" class="msg"></div>

      <div class="field">
        <label for="new-password">New Password</label>
        <input type="password" id="new-password" placeholder="Choose a strong password" autocomplete="new-password" required minlength="8">
      </div>

      <div class="field">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Repeat your password" autocomplete="new-password" required minlength="8">
      </div>

      <button type="submit" class="btn-gold" id="newpass-submit">Set New Password →</button>
    </form>

  </div>

  <p class="footer-note">
    New to IDT? <a href="/join.html">Apply to join →</a>
  </p>
</main>

<script>
const SUPABASE_URL  = 'https://hlmdkhixdrowbnxgbuvy.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhsbWRraGl4ZHJvd2JueGdidXZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NDIzMjQsImV4cCI6MjA5MjAxODMyNH0.2QOyrIHHReHH2prRCP78UcO1I3oCqauKpn_0pjpP7W8';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

// ── Helpers ──
function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.textContent = loading ? 'Please wait…' : btn.dataset.label;
}

// Store original button labels
['signin-submit','reset-submit','newpass-submit'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.dataset.label = el.textContent;
});

// ── Role-based redirect ──
function redirectByRole(role) {
  if (role === 'admin') {
    window.location.replace('https://whitegold-app.vercel.app/admin.html');
  } else if (role === 'supplier') {
    window.location.replace('https://whitegold-app.vercel.app/supplier.html');
  } else if (role === 'buyer') {
    window.location.replace('https://whitegold-app.vercel.app/buyer.html');
  } else {
    showMsg('signin-msg', 'Your account is pending approval. You will receive an email once your access is confirmed.', 'error');
    setLoading('signin-submit', false);
  }
}

// ── Show pending-approval message if redirected here with ?error=pending ──
if (new URLSearchParams(window.location.search).get('error') === 'pending') {
  const msg = document.getElementById('signin-msg');
  msg.textContent = 'Your account is pending approval. You will receive an email when your access is confirmed.';
  msg.className = 'msg error';
}

// ── Detect password-reset flow (#access_token in URL) ──
const hash = window.location.hash;
if (hash && hash.includes('access_token')) {
  document.getElementById('signin-form').style.display = 'none';
  document.getElementById('newpass-form').style.display = 'flex';
  document.getElementById('page-heading').textContent = 'Set New Password';
  document.querySelector('.eyebrow').textContent = 'Password Reset';
}

// ── Sign-in ──
document.getElementById('signin-form').addEventListener('submit', async e => {
  e.preventDefault();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  setLoading('signin-submit', true);

  const { data, error } = await db.auth.signInWithPassword({ email, password });

  if (error) {
    showMsg('signin-msg', error.message, 'error');
    setLoading('signin-submit', false);
    return;
  }

  let role = data.session?.user?.user_metadata?.role;
  if (!role) {
    const { data: profile } = await db.from('profiles').select('role').eq('id', data.user.id).single();
    role = profile?.role;
  }
  redirectByRole(role);
});

// ── Forgot password toggle ──
document.getElementById('forgot-btn').addEventListener('click', () => {
  document.getElementById('signin-form').style.display = 'none';
  document.getElementById('reset-form').style.display  = 'flex';
  document.getElementById('page-heading').textContent  = 'Reset Password';
  const reset_email = document.getElementById('reset-email');
  const signin_email = document.getElementById('email').value;
  if (signin_email) reset_email.value = signin_email;
  reset_email.focus();
});

document.getElementById('back-to-signin').addEventListener('click', () => {
  document.getElementById('reset-form').style.display  = 'none';
  document.getElementById('signin-form').style.display = 'flex';
  document.getElementById('page-heading').textContent  = 'Sign In to IDT';
});

// ── Send password reset email ──
document.getElementById('reset-form').addEventListener('submit', async e => {
  e.preventDefault();
  const email = document.getElementById('reset-email').value.trim();
  setLoading('reset-submit', true);

  const { error } = await db.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/login.html'
  });

  if (error) {
    showMsg('reset-msg', error.message, 'error');
  } else {
    showMsg('reset-msg', 'Check your inbox — a reset link is on its way.', 'success');
  }
  setLoading('reset-submit', false);
});

// ── Set new password ──
document.getElementById('newpass-form').addEventListener('submit', async e => {
  e.preventDefault();
  const newPass     = document.getElementById('new-password').value;
  const confirmPass = document.getElementById('confirm-password').value;

  if (newPass !== confirmPass) {
    showMsg('newpass-msg', 'Passwords do not match.', 'error');
    return;
  }

  setLoading('newpass-submit', true);

  const { data, error } = await db.auth.updateUser({ password: newPass });

  if (error) {
    showMsg('newpass-msg', error.message, 'error');
    setLoading('newpass-submit', false);
    return;
  }

  showMsg('newpass-msg', 'Password updated! Redirecting…', 'success');
  let role = data.user?.user_metadata?.role;
  if (!role) {
    const { data: profile } = await db.from('profiles').select('role').eq('id', data.user.id).single();
    role = profile?.role;
  }
  setTimeout(() => redirectByRole(role), 1200);
});
</script>
</body>
</html>
