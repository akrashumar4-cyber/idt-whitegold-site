<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Your Password — International Diamond Trade</title>
<meta name="description" content="Create your password to access the International Diamond Trade platform.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg0: #06080F;
  --bg1: #0D1020;
  --bg2: #131726;
  --gold: #C9A84C;
  --gold-light: #E8D5A3;
  --gold-dim: rgba(201,168,76,0.10);
  --gold-border: rgba(201,168,76,0.28);
  --text: #E8E8F0;
  --text-muted: #8A8FAA;
  --border-sub: rgba(255,255,255,0.06);
  --radius: 18px;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg0);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%, rgba(201,168,76,0.055) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 90%, rgba(201,168,76,0.04) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.topbar {
  width: 100%;
  padding: 28px 48px;
  display: flex;
  align-items: center;
  border-bottom: 1px solid var(--border-sub);
  position: relative;
  z-index: 1;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 14px;
  text-decoration: none;
  color: inherit;
}

.logo-diamond { width: 38px; height: 38px; flex-shrink: 0; }

.logo-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.35rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--gold-light);
  display: flex;
  flex-direction: column;
  line-height: 1;
  gap: 3px;
}

.logo-sub {
  font-size: 0.6rem;
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-muted);
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 64px 24px 96px;
  position: relative;
  z-index: 1;
  width: 100%;
}

.eyebrow {
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.eyebrow::before, .eyebrow::after {
  content: '';
  display: block;
  width: 32px;
  height: 1px;
  background: var(--gold);
  opacity: 0.5;
}

.heading {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 400;
  text-align: center;
  color: var(--gold-light);
  margin-bottom: 12px;
  letter-spacing: 0.01em;
}

.subheading {
  font-size: 0.92rem;
  color: var(--text-muted);
  text-align: center;
  font-weight: 300;
  max-width: 380px;
  line-height: 1.65;
  margin-bottom: 40px;
}

.card {
  background: var(--bg1);
  border: 1px solid var(--gold-border);
  border-radius: var(--radius);
  padding: 48px 44px 40px;
  width: 100%;
  max-width: 440px;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 70% 40% at 50% 0%, rgba(201,168,76,0.06) 0%, transparent 70%);
  pointer-events: none;
}

.form { display: flex; flex-direction: column; gap: 20px; position: relative; }

.field { display: flex; flex-direction: column; gap: 7px; }

label {
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
}

input[type="password"] {
  background: var(--bg2);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 8px;
  padding: 13px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  width: 100%;
}

input[type="password"]:focus {
  border-color: rgba(201,168,76,0.55);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
}

input::placeholder { color: var(--text-muted); opacity: 0.6; }

/* Password strength bar */
.strength-wrap { display: flex; flex-direction: column; gap: 5px; }
.strength-bar {
  height: 3px;
  border-radius: 2px;
  background: var(--bg2);
  overflow: hidden;
}
.strength-fill {
  height: 100%;
  border-radius: 2px;
  width: 0%;
  transition: width 0.3s, background 0.3s;
}
.strength-label {
  font-size: 0.72rem;
  color: var(--text-muted);
  min-height: 1em;
}

.btn-gold {
  background: var(--gold);
  color: #06080F;
  border: 1px solid var(--gold);
  border-radius: 8px;
  padding: 14px 32px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: background 0.2s, box-shadow 0.2s;
  width: 100%;
  margin-top: 4px;
}
.btn-gold:hover {
  background: var(--gold-light);
  box-shadow: 0 4px 24px rgba(201,168,76,0.3);
}
.btn-gold:disabled {
  opacity: 0.55;
  cursor: not-allowed;
}

.msg {
  font-size: 0.85rem;
  padding: 11px 14px;
  border-radius: 8px;
  display: none;
  line-height: 1.5;
}
.msg.error   { background: rgba(224,85,85,0.1);  border: 1px solid rgba(224,85,85,0.3);  color: #f08080; display: block; }
.msg.success { background: rgba(76,175,125,0.1); border: 1px solid rgba(76,175,125,0.3); color: #6fcf97; display: block; }

@media (max-width: 500px) {
  .topbar { padding: 20px; }
  .card { padding: 36px 24px 32px; }
}
</style>
</head>
<body>

<header class="topbar">
  <a href="/" class="nav-logo">
    <svg class="logo-diamond" viewBox="0 0 40 40" fill="none">
      <polygon points="20,2 38,14 38,26 20,38 2,26 2,14" stroke="#C9A84C" stroke-width="1" fill="rgba(201,168,76,0.05)"/>
      <polygon points="20,8 32,16 32,24 20,32 8,24 8,16" stroke="#C9A84C" stroke-width="0.5" fill="rgba(201,168,76,0.08)"/>
      <line x1="20" y1="2" x2="20" y2="38" stroke="#C9A84C" stroke-width="0.4" opacity="0.5"/>
      <line x1="2" y1="14" x2="38" y2="26" stroke="#C9A84C" stroke-width="0.4" opacity="0.5"/>
      <line x1="2" y1="26" x2="38" y2="14" stroke="#C9A84C" stroke-width="0.4" opacity="0.5"/>
      <circle cx="20" cy="20" r="2" fill="#C9A84C" opacity="0.7"/>
    </svg>
    <span class="logo-text">IDT
      <span class="logo-sub">International Diamond Trade</span>
    </span>
  </a>
</header>

<main class="main">
  <div class="eyebrow">Account Setup</div>
  <h1 class="heading">Set Your Password</h1>
  <p class="subheading">Welcome to IDT. Create your password to access the platform.</p>

  <div class="card">
    <form class="form" id="setpass-form" style="display:none;">
      <div id="setpass-msg" class="msg"></div>

      <div class="field">
        <label for="new-password">Password</label>
        <input type="password" id="new-password" placeholder="Choose a strong password" autocomplete="new-password" required minlength="8">
        <div class="strength-wrap">
          <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
          <span class="strength-label" id="strength-label"></span>
        </div>
      </div>

      <div class="field">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Repeat your password" autocomplete="new-password" required minlength="8">
      </div>

      <button type="submit" class="btn-gold" id="setpass-submit">Set Password →</button>
    </form>
  </div>
</main>

<script>
const SUPABASE_URL  = 'https://hlmdkhixdrowbnxgbuvy.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhsbWRraGl4ZHJvd2JueGdidXZ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NDIzMjQsImV4cCI6MjA5MjAxODMyNH0.2QOyrIHHReHH2prRCP78UcO1I3oCqauKpn_0pjpP7W8';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

// ── Helpers ──
function showMsg(text, type) {
  const el = document.getElementById('setpass-msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}

function setLoading(loading) {
  const btn = document.getElementById('setpass-submit');
  btn.disabled    = loading;
  btn.textContent = loading ? 'Please wait…' : 'Set Password →';
}

// ── Role-based redirect ──
async function redirectByRole(userId, session) {
  let role = session?.user?.user_metadata?.role;
  if (!role) {
    const { data } = await db.from('profiles').select('role').eq('id', userId).single();
    role = data?.role;
  }
  if (role === 'admin') {
    window.location.replace('https://whitegold-app.vercel.app/admin.html');
  } else if (role === 'supplier') {
    window.location.replace('https://whitegold-app.vercel.app/supplier.html');
  } else if (role === 'buyer') {
    window.location.replace('https://whitegold-app.vercel.app/buyer.html');
  } else {
    window.location.replace('https://whitegold-site.vercel.app');
  }
}

// ── Password strength indicator ──
const strengthColors = ['#E05555', '#E08855', '#C9A84C', '#4CAF7D'];
const strengthTexts  = ['Weak', 'Fair', 'Good', 'Strong'];

document.getElementById('new-password').addEventListener('input', function() {
  const v = this.value;
  let score = 0;
  if (v.length >= 8)                       score++;
  if (/[A-Z]/.test(v) && /[a-z]/.test(v)) score++;
  if (/[0-9]/.test(v))                     score++;
  if (/[^A-Za-z0-9]/.test(v))             score++;
  const pct = v.length === 0 ? 0 : Math.max(1, score) * 25;
  document.getElementById('strength-fill').style.width      = pct + '%';
  document.getElementById('strength-fill').style.background = v.length ? strengthColors[score - 1] || strengthColors[0] : 'transparent';
  document.getElementById('strength-label').textContent     = v.length ? strengthTexts[score - 1] || strengthTexts[0] : '';
});

// ── Parse query params and establish session after DOM is ready ──
document.addEventListener('DOMContentLoaded', async function() {
  const params     = new URLSearchParams(window.location.search);
  const tokenHash  = params.get('token_hash');
  const type       = params.get('type') || 'recovery';

  if (!tokenHash) {
    window.location.replace('https://whitegold-site.vercel.app/login.html');
    return;
  }

  const { error } = await db.auth.verifyOtp({ token_hash: tokenHash, type });
  if (error) {
    window.location.replace('https://whitegold-site.vercel.app/login.html');
    return;
  }

  // Session established — reveal the form
  document.getElementById('setpass-form').style.display = 'flex';
});

// ── Submit ──
document.getElementById('setpass-form').addEventListener('submit', async e => {
  e.preventDefault();

  const newPass     = document.getElementById('new-password').value;
  const confirmPass = document.getElementById('confirm-password').value;

  if (newPass !== confirmPass) {
    showMsg('Passwords do not match.', 'error');
    return;
  }

  if (newPass.length < 8) {
    showMsg('Password must be at least 8 characters.', 'error');
    return;
  }

  setLoading(true);

  const { data, error } = await db.auth.updateUser({ password: newPass });

  if (error) {
    showMsg(error.message, 'error');
    setLoading(false);
    return;
  }

  showMsg('Password set! Redirecting to the platform…', 'success');
  setTimeout(() => redirectByRole(data.user.id, { user: data.user }), 1200);
});
</script>
</body>
</html>
